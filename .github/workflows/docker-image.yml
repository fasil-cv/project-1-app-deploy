name: Docker CI

on:
  push:
    branches: [ "main" ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

jobs:

  # Build the image
  build:
    runs-on: ubuntu-latest  
    steps:
      - uses: actions/checkout@v4
      - name: Set version 00
        id: ver
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Show version
        run: |
          echo "VERSION=${GITHUB_REF_NAME}"
          
      - name: build and tag
        run: |
          docker build -t myapp:v1.1.0 .
          docker tag myapp:v1.1.0 myapp:latest
  # Test the image
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: echo "Run tests"
  test2:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: echo "test-2"
  test3:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: echo "test-3"
  # Push image
  push:
    needs: [ test, test2 ]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Push image to docker registry"
